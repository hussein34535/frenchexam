  {
    "subj": "قانون فرنسي",
    "q": "Activité lucrative:",
    "opts": [
      "نشاط خيري",
      "نشاط مربح/مكسب",
      "نشاط سياسي"
    ],
    "answer": 1
  }
];

let idx = 0, score = 0, answered = 0, qState = [], mode = 'all';
let shuffled = [];
let examQs = [];

function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function typeLabel(q) { return q.opts.length===2 && q.opts[0]==='صح' ? '✅ صح/خطأ' : '❓ اختيار من متعدد'; }

function getCounts() {
  const all = questions.length;
  const tf = questions.filter(q => q.opts.length===2 && q.opts[0]==='صح').length;
  const mcq = all - tf;
  return { all, tf, mcq };
}

function renderMenu() {
  const c = getCounts();
  document.getElementById('subtitle').textContent = `إجمالي ${c.all} سؤال (${c.tf} صح/خطأ + ${c.mcq} اختيار من متعدد)`;
  document.getElementById('topBtns').innerHTML = `
    <button class="btn btn-primary" onclick="start('all')">📚 الجميع (${c.all})</button>
    <button class="btn btn-success" onclick="start('tf')">✅ صح/خطأ (${c.tf})</button>
    <button class="btn btn-warning" onclick="start('mcq')">❓ اختيارات (${c.mcq})</button>
  `;
  document.getElementById('main').innerHTML = `<div class="card" style="text-align:center;padding:40px;color:#666;">اختر نوع الأسئلة من الأزرار أعلاه لبدء الامتحان</div>`;
  document.getElementById('bottomBtns').innerHTML = '';
}

function start(type) {
  mode = type;
  if (type === 'tf') examQs = questions.filter(q => q.opts.length===2 && q.opts[0]==='صح');
  else if (type === 'mcq') examQs = questions.filter(q => !(q.opts.length===2 && q.opts[0]==='صح'));
  else examQs = [...questions];
  shuffled = shuffle(examQs);
  idx = 0; score = 0; answered = 0;
  qState = shuffled.map(() => ({ selected: null, revealed: false }));
  render();
}

function render() {
  const total = shuffled.length;
  document.getElementById('subtitle').textContent = `السؤال ${idx+1}/${total} | ${mode==='tf'?'✅ صح/خطأ':mode==='mcq'?'❓ اختيارات':'📚 الجميع'} | الإجابات: ${score}/${answered}`;

  const q = shuffled[idx];
  const state = qState[idx];
  
  let optsHtml = q.opts.map((o, i) => {
    let cls = 'opt';
    if (state.revealed) { cls += ' disabled'; if (i === q.answer) cls += ' correct'; if (i === state.selected && i !== q.answer) cls += ' wrong'; }
    else if (state.selected === i) cls += ' selected';
    return `<div class="${cls}" onclick="selectOpt(${i})">${o}</div>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="card">
      <div class="q-num">${typeLabel(q)}</div>
      <div class="q-text">${q.q}</div>${q.t ? '<div style="background:#f0f7ff;padding:10px;border-radius:6px;margin-bottom:12px;font-size:14px;line-height:1.5;color:#1a237e;border-right:3px solid #1a73e8;">📖 ' + q.t + '</div>' : ''}
      <div class="opts">${optsHtml}</div>
    </div>
  `;

  const prevBtn = `<button class="btn btn-outline" onclick="go(${idx-1})" ${idx===0?'disabled':''}>◀ السابق</button>`;
  const nextBtn = `<button class="btn btn-outline" onclick="go(${idx+1})" ${idx>=total-1?'disabled':''}>التالي ▶</button>`;
  const revealBtn = state.revealed ? '' : `<button class="btn btn-primary" onclick="reveal()">🔍 إظهار الإجابة</button>`;

  document.getElementById('bottomBtns').innerHTML = `
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
      ${prevBtn}${revealBtn}${nextBtn}
    </div>
    <div style="text-align:center;margin-top:10px;">
      <button class="btn btn-danger" onclick="renderMenu()">🏠 القائمة الرئيسية</button>
      ${answered === total ? `<button class="btn btn-success" onclick="showResult()">📊 النتيجة النهائية</button>` : ''}
    </div>
  `;
}

function selectOpt(i) {
  const state = qState[idx];
  if (state.revealed) return;
  if (state.selected === null) answered++;
  if (state.selected === null) {
    if (i === shuffled[idx].answer) score++;
  } else {
    if (state.selected === shuffled[idx].answer) score--;
    if (i === shuffled[idx].answer) score++;
  }
  state.selected = i;
  state.revealed = true;
  if (i !== shuffled[idx].answer && shuffled[idx].t) {
    const _q = shuffled[idx];
    setTimeout(() => {
      const _el = document.querySelector('#main .card .opts');
      if (_el) {
        const _e = document.createElement('div');
        _e.style.cssText = 'margin-top:8px;padding:10px;background:#fff3e0;border-radius:6px;border-right:3px solid #f57c00;font-size:13px;line-height:1.6;';
        _e.innerHTML = '<strong>❌ الإجابة خطأ</strong><br>📖 ' + _q.t;
        _el.after(_e);
      }
    }, 50);
  }
  render();
}

function reveal() {
  const state = qState[idx];
  if (state.revealed) return;
  if (state.selected === null) {
    answered++;
  } else {
    if (state.selected === shuffled[idx].answer) { /* already correct */ }
  }
  state.revealed = true;
  render();
}

function go(n) { if (n>=0 && n<shuffled.length) { idx=n; render(); } }

function showResult() {
  const total = shuffled.length;
  const pct = Math.round((score/total)*100);
  let grade = pct>=90?'ممتاز':pct>=80?'جيد جداً':pct>=70?'جيد':pct>=60?'مقبول':'راسب';

  const wrong = shuffled.filter((q,i) => qState[i].selected !== q.answer);
  let wrongHtml = '';
  if (wrong.length > 0) {
    wrongHtml = wrong.slice(0,10).map((q,i) => `
      <div style="margin-bottom:10px;padding:10px;background:#fce8e6;border-radius:8px;font-size:13px;">
        <strong>${i+1}.</strong> ${q.q.substring(0,80)}<br>
        <span style="color:#34a853;">✅ الصح: ${q.opts[q.answer]}</span>
        ${q.t ? `<br><span style="color:#1a237e;font-size:12px;">📖 ${q.t.substring(0,60)}</span>` : ''}
      </div>
    `).join('');
    if (wrong.length > 10) wrongHtml += `<div style="color:#666;">...و ${wrong.length-10} أخطاء أخرى</div>`;
  }

  document.getElementById('main').innerHTML = `
    <div class="card result-box">
      <h2>📊 النتيجة</h2>
      <div class="grade">${grade}</div>
      <div style="font-size:16px;margin:5px 0;">${score}/${total}</div>
      <div style="font-size:24px;font-weight:700;color:#1a73e8;">${pct}%</div>
      ${wrong.length > 0 ? `<hr><div style="text-align:right;"><h3 style="font-size:14px;color:#ea4335;margin-bottom:10px;">الأخطاء (${wrong.length})</h3>${wrongHtml}</div>` : '<hr><div style="color:#34a853;font-size:18px;">🎉 كل الإجابات صحيحة!</div>'}
    </div>
  `;
  document.getElementById('bottomBtns').innerHTML = `
    <button class="btn btn-primary" onclick="start('${mode}')">🔄 إعادة الامتحان</button>
    <button class="btn btn-danger" onclick="renderMenu()">🏠 القائمة الرئيسية</button>
  `;
}

renderMenu();
</script>
</body>
</html>
